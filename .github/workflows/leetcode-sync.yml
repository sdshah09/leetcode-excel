name: LeetCode Daily Sync

on:
  schedule:
    - cron: "0 6 * * *"  # Runs at 6 AM UTC daily
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync LeetCode submissions
        env:
          LEETCODE_USERNAME: sdshah0616
        run: python sync_submissions.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leetcode_log.xlsx
          if ! git diff --staged --quiet; then
            git commit -m "chore: update LeetCode log"
            git push
          fi
